<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── SEO & Social ─────────────────────────────────────────── -->
    <meta name="description" content="{{DESCRIPTION}}" />
    {{KEYWORDS}}
    <meta name="author" content="{{AUTHOR}}" />
    <meta name="robots" content="{{ROBOTS}}" />
    <meta name="theme-color" content="#121212" />

    <!-- Canonical URL -->
    <link rel="canonical" href="{{BASE_URL}}{{CANONICAL}}" />

    <!-- Open Graph -->
    <meta property="og:title" content="{{OG_TITLE}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:type" content="{{OG_TYPE}}" />
    <meta property="og:site_name" content="Y-SQLVIZ" />
    {{OG_IMAGE}}
    <meta property="og:url" content="{{BASE_URL}}{{CANONICAL}}" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="{{TWITTER_CARD}}" />
    <meta name="twitter:site" content="@Y_SQLVIZ" />
    <meta name="twitter:creator" content="@Y_SQLVIZ" />
    <meta name="twitter:title" content="{{TWITTER_TITLE}}" />
    <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}" />
    {{TWITTER_IMAGE}}

    <!-- Profile -->
    {{PROFILE_LINK}}

    <!-- Structured Data (JSON-LD) -->
    {{JSONLD}}

    <title>{{TITLE}}</title>

    <!-- ─── Favicon ───────────────────────────────── -->
    <link rel="icon" href="/Assets/Favicon/favicon_io/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/Assets/Favicon/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/Assets/Favicon/favicon_io/favicon-16x16.png" />
    <link rel="manifest" href="/Assets/Favicon/favicon_io/site.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Assets/Favicon/favicon_io/apple-touch-icon.png" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/Assets/fonts/css/all.min.css" />

    <!-- Global Navigation & Menu Styles -->
    <link rel="stylesheet" href="/global/nav.css" />
    <link rel="stylesheet" href="/Assets/fx/menu-toggle.css" />

    <!-- ─── Google Fonts ─────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" media="print" onload="this.media = 'all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
    </noscript>

    <!-- ─── Page-specific CSS ─────────────────────────── -->
    {{CSS_IMPORTS}}

    <!-- ==== Scripts ==== -->
    <script src="/Assets/Favicon/icon-ani.js" defer></script>
    <script src="/global/nav-footer-loader.js" defer></script>
    <script src="/Assets/fx/menu-toggle.js" defer></script>
    {{SCRIPTS}}
  </head>
  <body{{BODY_CLASS}}>
    {{LOADER}}
    {{BODY_CONTENT}}
  </body>
</html>
